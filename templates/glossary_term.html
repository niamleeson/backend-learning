<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ entry.term }} - Glossary - Python Backend Developer Path</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Home</a> &rsaquo;
            <a href="/glossary">Glossary</a> &rsaquo;
            {{ entry.term }}
        </div>

        <div class="glossary-detail">
            <h1>{{ entry.term }}</h1>

            <div class="glossary-detail-section">
                <h2>Question</h2>
                <p>{{ entry.question }}</p>
            </div>

            <div class="glossary-detail-section">
                <h2>Answer</h2>
                {{ entry.answer | md }}
            </div>
        </div>

        <div class="footer">
            <a href="/glossary">&larr; Back to Glossary</a>
        </div>
    </div>
</body>
</html>
