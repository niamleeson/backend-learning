<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ entry.term }} - Glossary - Python Backend Developer Path</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="breadcrumb">
            <a href="/">Home</a> &rsaquo;
            <a href="/glossary">Glossary</a> &rsaquo;
            {{ entry.term }}
        </div>

        <div class="glossary-detail">
            <div style="display:flex;align-items:center;justify-content:space-between;gap:1rem;">
                <h1 style="margin:0;">{{ entry.term }}</h1>
                <form method="post" action="/glossary/{{ entry.slug }}/delete" onsubmit="return confirm('Remove this glossary entry?')">
                    <button type="submit" class="btn btn-sm" style="background:var(--red,#ef4444);border:none;color:#fff;cursor:pointer;">Remove</button>
                </form>
            </div>

            <div class="glossary-detail-section">
                <h2>Question</h2>
                <p>{{ entry.question }}</p>
            </div>

            <div class="glossary-detail-section">
                <h2>Answer</h2>
                {{ entry.answer | md }}
            </div>
        </div>

        <div class="footer">
            <a href="/glossary">&larr; Back to Glossary</a>
        </div>
    </div>
</body>
</html>
